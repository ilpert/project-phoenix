# =============================================================================
# API Façade / Strangler Fig Proxy — nginx.conf
# =============================================================================
#
# This is the single entry point for the full stack.
# It implements the API Façade modernization pattern as part of the Strangler Fig
# migration of spring-music-master.
#
# ROUTING STRATEGY (migration %)
# --------------------------------
# All traffic enters through port 80 on this gateway.
# The routing table below is the *only* place where we decide what percentage
# of the surface area has been migrated to new services.
#
#   /albums/*  → album-catalog:3001   (NEW — fully extracted seam, 100% traffic)
#   /*         → spring-music:8080    (LEGACY — all remaining monolith surface)
#
# To migrate a new seam:
#   1. Extract the service (see .agents/skills/extract-seam)
#   2. Add a new `location` block above the fallback `location /`
#   3. Remove the seam from the monolith once contract tests pass
#
# This file is the single lever for traffic migration. No code changes needed
# in upstream services or clients when moving traffic between old and new.
# =============================================================================

events {
    worker_connections 1024;
}

http {
    # ------------------------------------------------------------------
    # Upstream definitions
    # ------------------------------------------------------------------

    upstream album_catalog {
        # NEW service — album CRUD extracted seam (Node.js/TypeScript, port 3001)
        server album-catalog:3001;
    }

    upstream spring_music_monolith {
        # LEGACY patient — Spring Boot 2.4 monolith, all unextracted seams
        server spring-music:8080;
    }

    # ------------------------------------------------------------------
    # Logging
    # ------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ------------------------------------------------------------------
    # CORS helper map — allows the façade to add CORS regardless of which
    # upstream serves the response.
    # ------------------------------------------------------------------
    map $request_method $cors_method {
        OPTIONS  "true";
        default  "false";
    }

    # ------------------------------------------------------------------
    # Main server block — the API façade
    # ------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Timeouts tuned for a dev/demo stack; tighten for production
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # Forward real client info to upstreams
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ------------------------------------------------------------------
        # CORS headers — added by the façade so individual services don't
        # need to implement them independently.
        # ------------------------------------------------------------------
        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
        add_header 'Access-Control-Max-Age'        '3600' always;

        # Handle pre-flight OPTIONS requests at the gateway layer
        if ($cors_method = "true") {
            return 204;
        }

        # ------------------------------------------------------------------
        # Gateway health endpoint
        # Returns 200 OK as long as nginx is running.
        # Use this in load-balancer health checks — it does NOT check upstreams.
        # To test upstream health separately, hit /actuator/health (monolith)
        # or /health (album-catalog) directly.
        # ------------------------------------------------------------------
        location = /gateway-health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"ok","gateway":"nginx","note":"upstream health not checked here"}';
        }

        # ------------------------------------------------------------------
        # MIGRATED SEAM: /albums/*
        # ──────────────────────────────────────────────────────────────────
        # GET    /albums          → list all albums
        # GET    /albums/:id      → get album by id
        # POST   /albums          → create album
        # PUT    /albums/:id      → update album
        # DELETE /albums/:id      → delete album
        #
        # Routes to the NEW album-catalog service (Node.js/TypeScript).
        # This seam is 100% migrated. The monolith still has /albums routes
        # but they are no longer reachable through the gateway.
        #
        # Strangler Fig note: if album-catalog goes unhealthy, nginx will
        # return 502. The monolith is NOT used as a fallback — we want the
        # outage to be visible so it gets fixed, not silently swallowed.
        # ------------------------------------------------------------------
        location ~ ^/albums(/.*)?$ {
            proxy_pass http://album_catalog;

            # Tag requests so upstreams can observe which path served them
            proxy_set_header X-Served-By "album-catalog";
            proxy_set_header X-Gateway-Version "1.0";
        }

        # ------------------------------------------------------------------
        # FALLBACK: everything else → legacy monolith
        # ──────────────────────────────────────────────────────────────────
        # All unextracted seams — health, frontend assets, artist pages,
        # profile/DB management, etc. — still served by the Spring Boot 2.4
        # monolith until extracted.
        #
        # Migration checklist (from scouts/LAST_RUN.md ranked list):
        #   [ ] error-testing   (LOW risk — next to extract)
        #   [ ] frontend-ui     (MEDIUM risk)
        #   [ ] health-info     (LOW risk)
        #   [ ] auth-session    (HIGH risk — defer)
        #   [ ] db-profile-switch (CRITICAL risk — defer last)
        # ------------------------------------------------------------------
        location / {
            proxy_pass http://spring_music_monolith;

            proxy_set_header X-Served-By "spring-music-monolith";
            proxy_set_header X-Gateway-Version "1.0";

            # Buffer settings — the monolith can be slow to start; be generous
            proxy_buffering    on;
            proxy_buffer_size  16k;
            proxy_buffers      8 16k;
        }
    }
}
