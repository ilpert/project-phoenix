services:
  spring-music:
    build:
      context: ./spring-music-master
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  album-catalog:
    build:
      context: ./services/album-catalog
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      spring-music:
        condition: service_healthy
      album-catalog:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/gateway-health"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./project-phoenix
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      - ALBUM_API_URL=http://album-catalog:3001
    depends_on:
      album-catalog:
        condition: service_healthy
